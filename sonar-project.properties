# SonarCloud 프로젝트 정보
sonar.projectKey=rgkim-hsu_Smart-IoT-Planting-System
sonar.organization=rgkim-hsu

# 프로젝트 메타데이터
sonar.projectName=Smart IoT Planting System
sonar.projectVersion=1.0

# Python 소스 (Django 프로젝트 구조에 맞춤)
sonar.sources=gateway,sensor,web

# 테스트 위치 (있다면)
sonar.tests=tests

# Python 커버리지
sonar.python.coverage.reportPaths=coverage.xml

# 제외
sonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**,**/static/**,**/media/**,**/.env,**/db.sqlite3,**/manage.py

# Python 버전
sonar.python.version=3.8,3.9,3.10,3.11